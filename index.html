<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCLAW 趋势</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222222;
      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.3);
      --border: #2a2a2a;
      --likes-color: #ff4757;
      --comments-color: #2ed573;
      --repost-color: #ffa502;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        url('https://pbs.twimg.com/profile_images/2017100664984186880/orbYx-3U_400x400.png') center center no-repeat,
        radial-gradient(circle at 30% 40%, rgba(255, 107, 53, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(255, 159, 67, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.7) 0%, var(--bg-primary) 100%),
        linear-gradient(180deg, var(--bg-primary) 0%, #0d0d0d 100%);
      background-size: 600px 600px, cover, cover, cover, cover;
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span { -webkit-text-fill-color: var(--accent); }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 40px;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(10px);
      padding: 4px;
      border-radius: 12px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      animation: fadeIn 0.8s ease-out 0.2s both;
      border: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .tab-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab-btn:hover { color: var(--text-primary); }

    .tab-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      font-weight: 500;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 4px 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
    }

    .official-badge {
      background: linear-gradient(135deg, var(--accent), #ff9f43);
      color: var(--bg-primary);
      border: none;
    }

    .section {
      margin-bottom: 60px;
      display: none;
    }

    .section.active { display: block; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
    }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardFadeIn 0.6s ease-out both;
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #ff9f43);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }

    .post-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .post-card:hover::before { opacity: 1; }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff9f43);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-letter {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--bg-primary);
    }

    .avatar.official {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
    }

    .author-info { flex: 1; min-width: 0; }

    .author-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .verified-icon {
      width: 16px;
      height: 16px;
      fill: var(--accent);
      flex-shrink: 0;
    }

    .author-handle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Post summary - main display */
    .post-summary {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-weight: 500;
      line-height: 1.5;
    }

    /* Expandable content */
    .post-content-wrapper {
      display: none;
      margin-bottom: 12px;
    }

    .post-content-wrapper.expanded {
      display: block;
    }

    .post-content-original {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .expand-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-right: 8px;
    }

    .expand-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .expand-btn.expanded {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg-primary);
    }

    .post-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      transition: gap 0.3s ease;
    }

    .post-link:hover { gap: 10px; }

    .card-metrics {
      display: flex;
      gap: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* GitHub specific styles */
    .github-card {
      border-left: 3px solid #238636;
    }

    .repo-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }

    .github-metrics {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .weekly-growth {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .weekly-growth.positive {
      background: rgba(46, 160, 67, 0.2);
      color: #3fb950;
    }

    .weekly-growth.negative {
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
    }

    .language-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .language-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }

    .metric-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metric.likes .metric-value { color: var(--likes-color); }
    .metric.comments .metric-value { color: var(--comments-color); }
    .metric.reposts .metric-value { color: var(--repost-color); }

    .metric-value { font-weight: 500; }
    .metric-label { color: var(--text-muted); font-size: 0.7rem; }

    .engagement-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, var(--accent), #ff9f43);
      color: var(--bg-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    .no-posts {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding: 24px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 768px) {
      .logo { font-size: 2.5rem; }
      .cards-grid { grid-template-columns: 1fr; }
      .tabs { flex-wrap: wrap; width: 100%; }
      .tab-btn { flex: 1; min-width: 100px; }
      body::before {
        background-size: 300px 300px, cover, cover, cover, cover;
      }
    }
  </style>
</head>

    function getCardImage(post) {
      if (post.image) {
        return post.image;
      }
      const banner = profileBanners[post.handle];
      if (banner) {
        return banner;
      }
      return 'https://pbs.twimg.com/profile_banners/1995710751097659392/1769751337/600x200';
    }

    function createCard(post, index) {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.style.animationDelay = `${index * 0.1}s`;

      const avatarClass = post.isOfficial ? 'avatar official' : 'avatar';
      const verifiedIcon = post.isOfficial ?
        '<svg class="verified-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : '';

      // Check if avatar is a URL or a letter
      const avatarHTML = post.avatar.startsWith('http') ?
        `<img src="${post.avatar}" alt="${post.author}" class="avatar-img">` :
        `<span class="avatar-letter">${post.avatar}</span>`;

      const cardImage = getCardImage(post);
      const fallbackImage = 'https://pbs.twimg.com/profile_banners/1995710751097659392/1769751337/600x200';
      const cardImageHTML = cardImage ?
        `<img class="card-image" src="${cardImage}" alt="Post image" onerror="this.src='${fallbackImage}'">` : '';

      card.innerHTML = `
        <div class="engagement-badge">#${index + 1}</div>
        ${cardImageHTML}
        <div class="card-content">
          <div class="card-header">
            <div class="${avatarClass}">${avatarHTML}</div>
            <div class="author-info">
              <div class="author-name">${post.author} ${verifiedIcon}</div>
              <div class="author-handle">${post.handle}</div>
            </div>
            <div class="post-date">${post.date}</div>
          </div>
          <div class="post-summary">${post.summary}</div>
          <div class="post-content-wrapper" id="content-${post.id}">
            <div class="post-content-original">${post.contentZh}</div>
          </div>
          <button class="expand-btn" onclick="toggleContent(${post.id}, this)">展开原文</button>
          <a href="${post.link}" class="post-link" target="_blank">
            查看原文 <span>→</span>
          </a>
          <div class="card-metrics">
            <div class="metric likes">
              <span class="metric-icon">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
              </span>
              <span class="metric-value">${formatNumber(post.likes)}</span>
              <span class="metric-label">赞</span>
            </div>
            <div class="metric comments">
              <span class="metric-icon">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/>
                </svg>
              </span>
              <span class="metric-value">${formatNumber(post.comments)}</span>
              <span class="metric-label">评论</span>
            </div>
            <div class="metric reposts">
              <span class="metric-icon">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                </svg>
              </span>
              <span class="metric-value">${formatNumber(post.reposts)}</span>
              <span class="metric-label">转发</span>
            </div>
          </div>
        </div>
      `;

      return card;
    }

    function toggleContent(postId, btn) {
      const content = document.getElementById(`content-${postId}`);
      content.classList.toggle('expanded');
      btn.classList.toggle('expanded');
      btn.textContent = content.classList.contains('expanded') ? '收起原文' : '展开原文';
    }

    function renderCards(posts, gridId) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = '';

      const sortedPosts = [...posts].sort((a, b) => b.totalEngagement - a.totalEngagement);
      const top10 = sortedPosts.slice(0, 10);

      if (top10.length === 0) {
        grid.innerHTML = '<div class="no-posts">暂无数据</div>';
        return;
      }

      top10.forEach((post, index) => {
        grid.appendChild(createCard(post, index));
      });
    }

    function formatNumber(num) {
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
      }
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
      }
      return num.toString();
    }

    // GitHub card creation
    function createGitHubCard(repo, index) {
      const card = document.createElement('div');
      card.className = 'post-card github-card';
      card.style.animationDelay = `${index * 0.1}s`;

      card.innerHTML = `
        <div class="engagement-badge">#${index + 1}</div>
        <div class="card-content">
          <div class="card-header">
            <img src="${repo.avatar}" alt="${repo.name}" class="repo-avatar">
            <div class="author-info">
              <div class="author-name">${repo.name}</div>
              <div class="author-handle">${repo.language}</div>
            </div>
            <div class="post-date">
              <span class="weekly-growth ${repo.weeklyGrowth ? 'positive' : 'negative'}">${repo.weeklyStars}</span>
            </div>
          </div>
          <div class="post-summary">${repo.descriptionZh}</div>
          <div class="github-metrics">
            <div class="metric">
              <span class="metric-icon">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16">

                </svg>
              </span>
              <span>${formatNumber(repo.stars)}</span>
            </div>
            <div class="metric">
              <span class="metric-icon">
                <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M6 2c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6H6zm7 7V3.5L18.5 9H13z"/>
                </svg>
              </span>
              <span>${formatNumber(repo.forks)}</span>
            </div>
            <div class="language-dot" style="background-color: ${repo.languageColor}"></div>
            <span class="language-name">${repo.language}</span>
          </div>
          <a href="${repo.link}" class="post-link" target="_blank">
            查看仓库 <span>→</span>
          </a>
        </div>
      `;
      return card;
    }

    function renderGitHubCards(repos, gridId) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = '';

      const sortedRepos = [...repos].sort((a, b) => b.stars - a.stars);
      const top10 = sortedRepos.slice(0, 10);

      if (top10.length === 0) {
        grid.innerHTML = '<div class="no-posts">暂无数据</div>';
        return;
      }

      top10.forEach((repo, index) => {
        grid.appendChild(createGitHubCard(repo, index));
      });
    }

    // Tab functionality
    const tabBtns = document.querySelectorAll('.tab-btn');
    const sections = document.querySelectorAll('.section');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tab = btn.dataset.tab;
        sections.forEach(section => {
          section.classList.remove('active');
          if (section.id === `${tab}-section`) {
            section.classList.add('active');
          }
        });
      });
    });

    document.getElementById('refresh-btn').addEventListener('click', (e) => {
      e.preventDefault();
      renderCards(officialPosts, 'official-grid');
      renderCards(dailyPosts, 'daily-grid');
      renderCards(weeklyPosts, 'weekly-grid');
      renderGitHubCards(githubRepos, 'github-grid');
    });

    // Initial render
    renderCards(officialPosts, 'official-grid');
    renderCards(dailyPosts, 'daily-grid');
    renderGitHubCards(githubRepos, 'github-grid');
    renderCards(weeklyPosts, 'weekly-grid');
  </script>
